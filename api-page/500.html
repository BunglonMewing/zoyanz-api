<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — ZoYanz APIs</title>
    <link rel="icon" href="/src/icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #080c10; --accent: #ff4d6d; --text: #e2f0ff;
            --muted: #4a6070; --border: rgba(255,77,109,0.08);
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Space Mono', monospace;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        body::after {
            content: ''; position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,77,109,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,77,109,0.025) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0;
        }
        .container {
            position: relative; z-index: 1;
            text-align: center; padding: 2rem;
            max-width: 400px;
        }
        .code {
            font-family: 'Syne', sans-serif;
            font-size: 7rem; font-weight: 800; line-height: 1;
            color: var(--accent); opacity: 0.15;
            margin-bottom: -1rem; letter-spacing: -4px;
        }
        .title {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem; font-weight: 800;
            color: var(--text); margin-bottom: 0.75rem;
        }
        .desc { font-size: 11px; color: var(--muted); line-height: 1.8; margin-bottom: 2rem; }
        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: var(--accent); color: #fff;
            padding: 0.6rem 1.4rem; font-size: 11px;
            font-weight: 700; letter-spacing: 1px;
            text-decoration: none; text-transform: uppercase;
        }
        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">500</div>
        <div class="title">Server Error</div>
        <div class="desc">Terjadi kesalahan di sisi server kami.<br>Tim kami sudah diberitahu. Coba lagi beberapa saat.</div>
        <a href="/" class="btn">← Back to Home</a>
    </div>
</body>
</html>
